<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaraX-Md Pair</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a1a2a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #25d366;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        #code {
            margin-top: 20px;
            font-size: 24px;
            word-break: break-all;
            color: #00f0ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>MaraX-Md Pairing</h2>
        <p>Enter the WhatsApp number you want to pair</p>
        <input type="text" id="number" placeholder="e.g. 263712345678" />
        <button onclick="getCode()">Get Pairing Code</button>
        <div id="code"></div>
    </div>
    <script>
        async function getCode() {
            const number = document.getElementById('number').value.trim();
            if (!number) return alert('Please enter a number');
            const res = await fetch('/code?number=' + encodeURIComponent(number));
            const data = await res.json();
            if (data.code) {
                document.getElementById('code').innerText = 'Your code: ' + data.code;
            } else {
                document.getElementById('code').innerText = 'Error generating code.';
            }
        }
    </script>
</body>
</html>
